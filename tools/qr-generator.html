<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stratos — Boarding Code Generator</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;800&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400;1,500;1,600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.9.2/lib/qr-code-styling.js"></script>

<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --gold: #C6A24B;
  --gold-light: #D4B86A;
  --gold-pale: #E8D5A0;
  --gold-dark: #9B7E2F;
  --black: #0B1A0B;
  --black-light: #0E200E;
  --black-card: #122412;
  --gray-700: #2A4A2A;
  --gray-400: #8A8A8A;
  --white: #F5F3EE;
  --white-dim: #C8C4BC;
  --font-display: 'Cormorant Garamond', Georgia, serif;
  --font-body: 'DM Sans', system-ui, sans-serif;
  --font-mono: 'Big Shoulders Display', sans-serif;
}

html, body { height: 100%; }
body {
  background: var(--black);
  color: var(--white);
  font-family: var(--font-body);
  font-weight: 400;
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  position: relative;
  min-height: 100vh;
}

/* Atmospheric gradient — gold bleed from upper right, deep green saturation */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 85% 0%, rgba(198, 162, 75, 0.18), transparent 60%),
    radial-gradient(ellipse 100% 80% at 15% 100%, rgba(11, 26, 11, 1), transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* Grain texture overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.4'/%3E%3C/svg%3E");
  opacity: 0.06;
  mix-blend-mode: overlay;
  pointer-events: none;
  z-index: 1;
}

main {
  position: relative;
  z-index: 2;
  max-width: 1400px;
  margin: 0 auto;
  padding: 80px 40px 120px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 56px;
}

/* ── HEADER ─────────────────────────── */
header { text-align: center; opacity: 0; animation: fadeUp 0.9s 0.15s ease-out forwards; }

.eyebrow {
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.42em;
  color: var(--gold);
  margin-bottom: 18px;
}

.eyebrow::before, .eyebrow::after {
  content: '';
  display: inline-block;
  width: 28px;
  height: 1px;
  background: var(--gold);
  vertical-align: middle;
  margin: 0 16px 4px;
  opacity: 0.5;
}

h1 {
  font-family: var(--font-display);
  font-style: italic;
  font-weight: 500;
  font-size: clamp(48px, 8vw, 76px);
  line-height: 0.95;
  letter-spacing: -0.015em;
  color: var(--white);
}

h1 em {
  font-style: italic;
  color: var(--gold);
  background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, var(--gold-dark) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}

.tagline {
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--white-dim);
  margin-top: 20px;
  letter-spacing: 0.04em;
}

/* ── JET PLATE ──────────────────────── */
.plate {
  position: relative;
  width: 100%;
  max-width: 1280px;
  background: linear-gradient(155deg, var(--black-card) 0%, var(--black-light) 50%, var(--black) 100%);
  border: 1px solid rgba(198, 162, 75, 0.35);
  padding: 32px 36px 28px;
  border-radius: 4px;
  box-shadow:
    0 30px 80px rgba(0, 0, 0, 0.6),
    0 0 0 1px rgba(198, 162, 75, 0.08),
    inset 0 1px 0 rgba(232, 213, 160, 0.1);
  opacity: 0;
  transform: scale(0.94);
  animation: rise 1.2s 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
}

/* Gold corner brackets — aviation panel detail */
.plate::before, .plate::after {
  content: '';
  position: absolute;
  width: 18px;
  height: 18px;
  border: 1px solid var(--gold);
}
.plate::before { top: 8px; left: 8px; border-right: none; border-bottom: none; }
.plate::after  { bottom: 8px; right: 8px; border-left: none; border-top: none; }

.plate .corner-tr, .plate .corner-bl {
  position: absolute;
  width: 18px;
  height: 18px;
  border: 1px solid var(--gold);
}
.plate .corner-tr { top: 8px; right: 8px; border-left: none; border-bottom: none; }
.plate .corner-bl { bottom: 8px; left: 8px; border-right: none; border-top: none; }

#jet-canvas {
  width: 100%;
  display: block;
  aspect-ratio: 4 / 3;
  position: relative;
}

#jet-canvas canvas {
  display: block;
  width: 100%;
  height: 100%;
}

/* Hidden offscreen QR source */
#qr-source {
  position: absolute;
  top: -9999px;
  left: -9999px;
  width: 800px;
  height: 800px;
}

/* Spec strip below QR — registration mark */
.spec-strip {
  font-family: var(--font-mono);
  font-weight: 600;
  font-size: 11px;
  letter-spacing: 0.32em;
  color: var(--gold);
  text-transform: uppercase;
  text-align: center;
  margin-top: 24px;
  padding-top: 18px;
  border-top: 1px solid rgba(198, 162, 75, 0.2);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
}

.spec-strip span:first-child { color: var(--gold-pale); opacity: 0.7; }
.spec-strip span:last-child  { color: var(--gold-pale); opacity: 0.7; }

/* ── CONTROLS ───────────────────────── */
.controls {
  width: 100%;
  max-width: 540px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  opacity: 0;
  animation: fadeUp 0.9s 0.95s ease-out forwards;
}

.field-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 8px;
}

#url-input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(198, 162, 75, 0.4);
  color: var(--white);
  font-family: var(--font-body);
  font-size: 16px;
  padding: 14px 0;
  letter-spacing: 0.01em;
  outline: none;
  transition: border-color 0.3s, color 0.3s;
}
#url-input:focus { border-bottom-color: var(--gold); color: var(--gold-pale); }

.actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-top: 12px;
}

button.action {
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 12px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  padding: 18px 24px;
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
  position: relative;
  overflow: hidden;
}

button.primary {
  background: linear-gradient(135deg, var(--gold-light), var(--gold) 50%, var(--gold-dark));
  border: 1px solid var(--gold);
  color: var(--black);
}
button.primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 30px rgba(198, 162, 75, 0.4);
  filter: brightness(1.08);
}

button.secondary {
  background: transparent;
  border: 1px solid rgba(198, 162, 75, 0.5);
  color: var(--gold);
}
button.secondary:hover {
  border-color: var(--gold);
  background: rgba(198, 162, 75, 0.08);
  color: var(--gold-pale);
}

/* ── ANIMATIONS ─────────────────────── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes rise {
  from { opacity: 0; transform: scale(0.94) translateY(16px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

/* ── RESPONSIVE ─────────────────────── */
@media (max-width: 600px) {
  main { padding: 48px 20px 80px; gap: 40px; }
  .plate { padding: 24px; }
  #qr-canvas { width: 280px; height: 280px; }
  .actions { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<main>
  <header>
    <p class="eyebrow">Stratos Aviation Detailing</p>
    <h1>Boarding <em>Plate</em></h1>
    <p class="tagline">Scan to launch · stratosjetdetail.com</p>
  </header>

  <div class="plate">
    <span class="corner-tr"></span>
    <span class="corner-bl"></span>
    <div id="jet-canvas"></div>
    <div class="spec-strip">
      <span>REG</span>
      <span>STRATOS · G-650 · QR-001</span>
      <span>VNY</span>
    </div>
  </div>

  <div id="qr-source"></div>

  <div class="controls">
    <div>
      <p class="field-label">Encoded URL</p>
      <input id="url-input" type="text" value="https://stratosjetdetail.com" spellcheck="false">
    </div>
    <div class="actions">
      <button class="action primary" id="download-png">Download Jet Plate · 3840</button>
      <button class="action secondary" id="download-svg">Download XL · 5760</button>
    </div>
  </div>
</main>

    image: logoDataUrl,
    margin: 0,
    qrOptions: {
      typeNumber: 0,
      mode: 'Byte',
      errorCorrectionLevel: 'H',
    },
    imageOptions: {
      hideBackgroundDots: true,
      imageSize: 0.32,
      margin: 6,
      crossOrigin: 'anonymous',
    },
    dotsOptions: {
      type: 'classy-rounded',
      color: GOLD,
    },
    cornersSquareOptions: {
      type: 'extra-rounded',
      color: '#1E351E',
    },
    cornersDotOptions: {
      type: 'dot',
      color: GOLD_LIGHT,
    },
    backgroundOptions: { color: 'transparent' },
  };
}

// Use the full Stratos wordmark logo but strip the trailing gold underline.
// Strategy: detect the underline as a thin, very-wide gold stripe at the
// bottom of the image, then crop above it. Falls back to no crop if no
// distinct underline is found.
async function stripUnderlineDataUrl(fullDataUrl) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const w = img.width, h = img.height;
      const tmp = document.createElement('canvas');
      tmp.width = w; tmp.height = h;
      const tctx = tmp.getContext('2d');
      tctx.drawImage(img, 0, 0);
      const data = tctx.getImageData(0, 0, w, h).data;

      const rowScore = new Uint32Array(h);
      for (let y = 0; y < h; y++) {
        let count = 0;
        for (let x = 0; x < w; x++) {
          const i = (y * w + x) * 4;
          const r = data[i], g = data[i+1], b = data[i+2], a = data[i+3];
          if (a > 30 && r > 120 && g > 80 && b < 180 && r > b) count++;
        }
        rowScore[y] = count;
      }

      const sparseThreshold = w * 0.005;
      const wideStripeThreshold = w * 0.35;

      // Global content bounds
      let yTop = 0, yBottom = h - 1;
      for (let y = 0; y < h; y++) if (rowScore[y] > sparseThreshold) { yTop = y; break; }
      for (let y = h - 1; y >= 0; y--) if (rowScore[y] > sparseThreshold) { yBottom = y; break; }

      // Walk from the bottom upward through any contiguous wide-stripe run.
      // If the run is short (≤22 rows) AND has a sparse gap above it (≥3 rows), it's the underline.
      let trailEnd = yBottom;
      let stripeStart = yBottom + 1;
      while (stripeStart > 0 && rowScore[stripeStart - 1] > wideStripeThreshold) stripeStart--;
      const stripeHeight = trailEnd - stripeStart + 1;

      let underlineDetected = false;
      if (stripeHeight > 0 && stripeHeight <= 22) {
        // Check for a gap above the stripe
        let gapAbove = 0;
        let yScan = stripeStart - 1;
        while (yScan >= 0 && rowScore[yScan] < sparseThreshold) { gapAbove++; yScan--; }
        if (gapAbove >= 3 && yScan >= 0) {
          yBottom = yScan; // crop ends here, before the gap and underline
          underlineDetected = true;
        }
      }

      // Horizontal extent across the kept rows
      let xMin = w, xMax = 0;
      for (let y = yTop; y <= yBottom; y++) {
        for (let x = 0; x < w; x++) {
          const i = (y * w + x) * 4;
          const a = data[i+3], r = data[i], g = data[i+1], b = data[i+2];
          if (a > 30 && r > 120 && g > 80 && b < 180 && r > b) {
            if (x < xMin) xMin = x;
            if (x > xMax) xMax = x;
          }
        }
      }

      const pad = 14;
      const sx = Math.max(0, xMin - pad);
      const sy = Math.max(0, yTop - pad);
      const sw = Math.min(w - sx, (xMax - xMin) + pad * 2);
      // Critical: do NOT pad below yBottom — that would pull the underline back in.
      const sh = Math.min(h - sy, yBottom - sy + 1);
      const outSize = Math.max(sw, sh);

      const out = document.createElement('canvas');
      out.width = outSize; out.height = outSize;
      const octx = out.getContext('2d');
      octx.drawImage(img, sx, sy, sw, sh, (outSize - sw) / 2, (outSize - sh) / 2, sw, sh);
      console.log('[stripUnderline] detected:', underlineDetected, 'crop yTop:', yTop, 'yBottom:', yBottom, 'stripeHeight:', stripeHeight);
      resolve(out.toDataURL('image/png'));
    };
    img.src = fullDataUrl;
  });
}

// ──────────────────────────────────────────────────────────────
// JET COMPOSITE
// ──────────────────────────────────────────────────────────────
// The QR is the cabin/fuselage in a top-down view. Wings, nose cone,
// engines, and T-tail are smooth gold-gradient SVG paths drawn around
// the QR with a 10% quiet-zone gap so scanning isn't disturbed.

function makeGoldGradient(ctx, x1, y1, x2, y2) {
  const g = ctx.createLinearGradient(x1, y1, x2, y2);
  g.addColorStop(0,    '#E8D5A0');
  g.addColorStop(0.35, '#D4B86A');
  g.addColorStop(0.65, '#C6A24B');
  g.addColorStop(1,    '#A88638');
  return g;
}

// One unified jet silhouette — single path, drawn with QR cabin punched out.
// Counterclockwise from nose tip, around left side, to tail, mirrored back up.
function buildJetSilhouettePath(ctx, qrCx, qrCy, qrSize, W, H) {
  const qrLeft = qrCx - qrSize / 2;
  const qrRight = qrCx + qrSize / 2;
  const qrTop = qrCy - qrSize / 2;
  const qrBottom = qrCy + qrSize / 2;

  // Anchor points (left side; mirror by computing right via 2*qrCx - x)
  const noseTipY     = qrTop - qrSize * 0.42;
  const noseBaseGap  = qrSize * 0.08;             // quiet-zone clear above/below QR
  const fwdShoulderY = qrTop - noseBaseGap;
  const fwdShoulderX = qrCx - qrSize * 0.30;     // narrower than QR — clean shoulder
  const wingRootFwdY = qrCy - qrSize * 0.18;
  const wingRootAftY = qrCy + qrSize * 0.30;
  const wingTipFwdY  = qrCy + qrSize * 0.16;     // significantly swept (tip aft of root forward)
  const wingTipAftY  = qrCy + qrSize * 0.26;
  const wingTipX     = W * 0.04;
  const wingMidX     = qrLeft - qrSize * 0.55;
  const aftShoulderY = qrBottom + noseBaseGap;
  const aftShoulderX = qrCx - qrSize * 0.22;     // taper begins
  const stabRootY    = qrBottom + qrSize * 0.32;
  const stabTipX     = qrCx - qrSize * 0.38;
  const stabTipY     = qrBottom + qrSize * 0.42;
  const tailBaseY    = qrBottom + qrSize * 0.46;
  const tailTipY     = qrBottom + qrSize * 0.58;

  const M = (x) => 2 * qrCx - x; // mirror x across centerline

  ctx.beginPath();

  // 1. Nose tip
  ctx.moveTo(qrCx, noseTipY);

  // 2. Down LEFT side of nose to forward shoulder
  ctx.bezierCurveTo(
    qrCx - qrSize * 0.06, noseTipY + (fwdShoulderY - noseTipY) * 0.20,
    qrCx - qrSize * 0.30, noseTipY + (fwdShoulderY - noseTipY) * 0.65,
    fwdShoulderX, fwdShoulderY
  );

  // 3. Forward shoulder transitions out to wing root forward
  ctx.bezierCurveTo(
    fwdShoulderX - qrSize * 0.05, fwdShoulderY + qrSize * 0.06,
    qrLeft - qrSize * 0.02, wingRootFwdY - qrSize * 0.08,
    qrLeft - qrSize * 0.02, wingRootFwdY
  );

  // 4. Wing leading edge: swept-back curve to wing tip
  ctx.bezierCurveTo(
    qrLeft - qrSize * 0.30, wingRootFwdY - qrSize * 0.02,
    wingMidX, wingTipFwdY - qrSize * 0.10,
    wingTipX + qrSize * 0.02, wingTipFwdY
  );

  // 5. Wing tip: subtle rounded edge
  ctx.bezierCurveTo(
    wingTipX - qrSize * 0.005, wingTipFwdY + (wingTipAftY - wingTipFwdY) * 0.35,
    wingTipX - qrSize * 0.005, wingTipFwdY + (wingTipAftY - wingTipFwdY) * 0.65,
    wingTipX + qrSize * 0.02, wingTipAftY
  );

  // 6. Wing trailing edge: back to wing root aft
  ctx.bezierCurveTo(
    wingMidX + qrSize * 0.10, wingTipAftY + qrSize * 0.04,
    qrLeft - qrSize * 0.20, wingRootAftY,
    qrLeft - qrSize * 0.02, wingRootAftY
  );

  // 7. Down LEFT side of QR cabin to bottom-left corner-ish (re-converge to body)
  ctx.bezierCurveTo(
    qrLeft - qrSize * 0.02, wingRootAftY + qrSize * 0.10,
    qrLeft - qrSize * 0.04, qrBottom - qrSize * 0.05,
    qrLeft - qrSize * 0.02, qrBottom + qrSize * 0.02
  );

  // 8. Aft shoulder: tapering rear fuselage
  ctx.bezierCurveTo(
    qrLeft, qrBottom + qrSize * 0.05,
    aftShoulderX - qrSize * 0.04, aftShoulderY - qrSize * 0.02,
    aftShoulderX, aftShoulderY
  );

  // 9. Down to horizontal-stabilizer tip
  ctx.bezierCurveTo(
    aftShoulderX - qrSize * 0.04, aftShoulderY + qrSize * 0.20,
    stabTipX + qrSize * 0.04, stabRootY,
    stabTipX, stabTipY
  );

  // 10. Stabilizer trailing edge back toward fuselage centerline
  ctx.bezierCurveTo(
    stabTipX + qrSize * 0.10, stabTipY + qrSize * 0.04,
    qrCx - qrSize * 0.06, tailBaseY,
    qrCx - qrSize * 0.04, tailBaseY + qrSize * 0.02
  );

  // 11. Down to tail tip
  ctx.bezierCurveTo(
    qrCx - qrSize * 0.03, tailBaseY + (tailTipY - tailBaseY) * 0.5,
    qrCx - qrSize * 0.012, tailBaseY + (tailTipY - tailBaseY) * 0.85,
    qrCx, tailTipY
  );

  // ── Mirror right side back up ──

  // 12. Up from tail tip past stabilizer
  ctx.bezierCurveTo(
    M(qrCx - qrSize * 0.012), tailBaseY + (tailTipY - tailBaseY) * 0.85,
    M(qrCx - qrSize * 0.03), tailBaseY + (tailTipY - tailBaseY) * 0.5,
    M(qrCx - qrSize * 0.04), tailBaseY + qrSize * 0.02
  );
  ctx.bezierCurveTo(
    M(qrCx - qrSize * 0.06), tailBaseY,
    M(stabTipX + qrSize * 0.10), stabTipY + qrSize * 0.04,
    M(stabTipX), stabTipY
  );
  ctx.bezierCurveTo(
    M(stabTipX + qrSize * 0.04), stabRootY,
    M(aftShoulderX - qrSize * 0.04), aftShoulderY + qrSize * 0.20,
    M(aftShoulderX), aftShoulderY
  );
  ctx.bezierCurveTo(
    M(aftShoulderX - qrSize * 0.04), aftShoulderY - qrSize * 0.02,
    M(qrLeft), qrBottom + qrSize * 0.05,
    M(qrLeft - qrSize * 0.02), qrBottom + qrSize * 0.02
  );
  ctx.bezierCurveTo(
    M(qrLeft - qrSize * 0.04), qrBottom - qrSize * 0.05,
    M(qrLeft - qrSize * 0.02), wingRootAftY + qrSize * 0.10,
    M(qrLeft - qrSize * 0.02), wingRootAftY
  );
  ctx.bezierCurveTo(
    M(qrLeft - qrSize * 0.20), wingRootAftY,
    M(wingMidX + qrSize * 0.10), wingTipAftY + qrSize * 0.04,
    M(wingTipX + qrSize * 0.02), wingTipAftY
  );
  ctx.bezierCurveTo(
    M(wingTipX - qrSize * 0.005), wingTipFwdY + (wingTipAftY - wingTipFwdY) * 0.65,
    M(wingTipX - qrSize * 0.005), wingTipFwdY + (wingTipAftY - wingTipFwdY) * 0.35,
    M(wingTipX + qrSize * 0.02), wingTipFwdY
  );
  ctx.bezierCurveTo(
    M(wingMidX), wingTipFwdY - qrSize * 0.10,
    M(qrLeft - qrSize * 0.30), wingRootFwdY - qrSize * 0.02,
    M(qrLeft - qrSize * 0.02), wingRootFwdY
  );
  ctx.bezierCurveTo(
    M(qrLeft - qrSize * 0.02), wingRootFwdY - qrSize * 0.08,
    M(fwdShoulderX - qrSize * 0.05), fwdShoulderY + qrSize * 0.06,
    M(fwdShoulderX), fwdShoulderY
  );
  ctx.bezierCurveTo(
    M(qrCx - qrSize * 0.30), noseTipY + (fwdShoulderY - noseTipY) * 0.65,
    M(qrCx - qrSize * 0.06), noseTipY + (fwdShoulderY - noseTipY) * 0.20,
    qrCx, noseTipY
  );

  ctx.closePath();
}

function drawJetComposite(ctx, W, H, qrSourceCanvas) {
  const qrSize = Math.round(W * 0.32);
  const qrCx = W / 2;
  const qrCy = H * 0.42;                         // push QR up so tail fits
  const qrLeft = qrCx - qrSize / 2;
  const qrTop  = qrCy - qrSize / 2;

  // ── 1. Single jet silhouette path ──
  buildJetSilhouettePath(ctx, qrCx, qrCy, qrSize, W, H);

  // Gradient runs vertically from light-gold (nose) to deeper-gold (tail)
  ctx.fillStyle = makeGoldGradient(ctx, qrCx, qrTop - qrSize * 0.55, qrCx, qrCy + qrSize * 1.00);
  ctx.fill();

  // Subtle vertical-fin shadow trace down the centerline
  ctx.save();
  const finGrad = ctx.createLinearGradient(qrCx, qrCy + qrSize * 0.55, qrCx, qrCy + qrSize * 0.85);
  finGrad.addColorStop(0,    'rgba(11, 26, 11, 0.0)');
  finGrad.addColorStop(0.5,  'rgba(11, 26, 11, 0.36)');
  finGrad.addColorStop(1,    'rgba(11, 26, 11, 0.0)');
  ctx.fillStyle = finGrad;
  ctx.fillRect(qrCx - qrSize * 0.018, qrCy + qrSize * 0.55, qrSize * 0.036, qrSize * 0.30);
  ctx.restore();

  // ── 2. Engine pods (drawn on top of fuselage rear) ──
  const engineY = qrCy + qrSize * 0.62;
  const engXOff = qrSize * 0.16;
  const engRX = qrSize * 0.060;
  const engRY = qrSize * 0.14;
  [-1, 1].forEach(side => {
    const ex = qrCx + side * engXOff;
    // Pod body
    ctx.beginPath();
    ctx.ellipse(ex, engineY, engRX, engRY, 0, 0, Math.PI * 2);
    const podGrad = ctx.createLinearGradient(ex - engRX, engineY, ex + engRX, engineY);
    podGrad.addColorStop(0,    '#A88638');
    podGrad.addColorStop(0.5,  '#E8D5A0');
    podGrad.addColorStop(1,    '#A88638');
    ctx.fillStyle = podGrad;
    ctx.fill();
    // Front intake (darker oval at top)
    ctx.beginPath();
    ctx.ellipse(ex, engineY - engRY * 0.62, engRX * 0.55, engRY * 0.14, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#0B1A0B';
    ctx.fill();
    // Inner intake highlight
    ctx.beginPath();
    ctx.ellipse(ex, engineY - engRY * 0.65, engRX * 0.35, engRY * 0.06, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(198, 162, 75, 0.4)';
    ctx.fill();
  });

  // ── 3. Knock out QR cabin area, then draw QR ──
  ctx.save();
  ctx.globalCompositeOperation = 'destination-out';
  ctx.fillStyle = '#000';
  // Slight expansion to ensure clean knockout edge
  ctx.fillRect(qrLeft - 1, qrTop - 1, qrSize + 2, qrSize + 2);
  ctx.restore();

  // Cabin area background — deep aviation green so QR contrast is correct
  ctx.fillStyle = 'rgba(11, 26, 11, 0)';  // transparent, QR draws onto canvas bg
  ctx.fillRect(qrLeft, qrTop, qrSize, qrSize);

  ctx.drawImage(qrSourceCanvas, qrLeft, qrTop, qrSize, qrSize);

  // ── 4. Wing micro-annotations ──
  ctx.save();
  ctx.fillStyle = 'rgba(11, 26, 11, 0.55)';
  ctx.font = '600 ' + Math.round(W * 0.010) + 'px "Big Shoulders Display", "DM Sans", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('STRATOS · G-650', W * 0.20, qrCy + qrSize * 0.08);
  ctx.fillText('REG · QR-001', W - W * 0.20, qrCy + qrSize * 0.08);
  ctx.restore();
}

async function renderQrToCanvas(url, size) {
  const tmpDiv = document.getElementById('qr-source');
  tmpDiv.innerHTML = '';
  tmpDiv.style.width = size + 'px';
  tmpDiv.style.height = size + 'px';
  const qr = new QRCodeStyling(buildConfig(url, size));
  qr.append(tmpDiv);
  await new Promise(r => setTimeout(r, 700));
  return tmpDiv.querySelector('canvas');
}

async function buildJetComposite(url, scale) {
  const W = 2400 * scale, H = 1800 * scale;
  const composite = document.createElement('canvas');
  composite.width = W;
  composite.height = H;
  const ctx = composite.getContext('2d');

  const qrSourceSize = Math.round(W * 0.34);
  const qrSrc = await renderQrToCanvas(url, qrSourceSize);

  drawJetComposite(ctx, W, H, qrSrc);
  return composite;
}

async function refreshDisplay(url) {
  const target = document.getElementById('jet-canvas');
  target.innerHTML = '';
  const composite = await buildJetComposite(url, 0.5);  // 1200x900 display
  target.appendChild(composite);
}

async function init() {
  // Use the wordmark logo but strip the trailing gold underline
  logoDataUrl = await stripUnderlineDataUrl(LOGO_DATA_URL);

  const initialUrl = document.getElementById('url-input').value.trim();
  await refreshDisplay(initialUrl);

  let pendingTimer = null;
  document.getElementById('url-input').addEventListener('input', (e) => {
    const v = e.target.value.trim() || 'https://stratosjetdetail.com';
    if (pendingTimer) clearTimeout(pendingTimer);
    pendingTimer = setTimeout(() => refreshDisplay(v), 250);
  });

  document.getElementById('download-png').addEventListener('click', async () => {
    const url = document.getElementById('url-input').value.trim() || 'https://stratosjetdetail.com';
    const composite = await buildJetComposite(url, 1.6);  // 3840x2880 hi-res
    const a = document.createElement('a');
    a.href = composite.toDataURL('image/png');
    a.download = 'stratos-jet-plate.png';
    a.click();
  });

  document.getElementById('download-svg').addEventListener('click', async () => {
    // SVG export of jet+QR is complex — fall back to extra-hi-res PNG
    const url = document.getElementById('url-input').value.trim() || 'https://stratosjetdetail.com';
    const composite = await buildJetComposite(url, 2.4);  // 5760x4320
    const a = document.createElement('a');
    a.href = composite.toDataURL('image/png');
    a.download = 'stratos-jet-plate-xl.png';
    a.click();
  });

  // Hi-res off-screen render API for headless extraction
  window.__renderHiRes = async function(url, scale) {
    const composite = await buildJetComposite(url, scale || 1.6);
    return composite.toDataURL('image/png');
  };

  // Signal to headless renderer that composite is fully painted
  setTimeout(() => { window.__qrReady = true; }, 1500);
}

init();
